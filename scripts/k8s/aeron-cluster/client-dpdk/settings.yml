---
apiVersion: v1
kind: Pod
metadata:
  name: aeron-cluster-client
spec:
  containers:
    - name: aeronmd-dpdk
      image: "195275652846.dkr.ecr.eu-west-1.amazonaws.com/aeronmd-dpdk:a569c2bbf54a7802fae7795a93ed78e5a8565a3c"
    - name: aeron-cluster-client
      image: "195275652846.dkr.ecr.eu-west-1.amazonaws.com/aeron-benchmarks:db089c15a8b591f1370f54abf027103912190673"
      command: ["k8s/k8s-aeron-cluster-client.sh"]
      args:
        - "--output-file"
        - "cluster_dpdk_source=caf"
        - "--message-rate"
        - "101K"
        - "--message-length"
        - "288"
        - "--iterations"
        - "60"
