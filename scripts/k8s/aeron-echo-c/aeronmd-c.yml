---
apiVersion: v1
kind: Pod
metadata:
  name: all
  labels:
    aeronmd: c
spec:
  containers:
    - name: aeronmd-c
      imagePullPolicy: Always
      #command: ["/opt/aeron-benchmarks/scripts/k8s/k8s-c-media-driver.sh"]
      args:
        - -Daeron.dir=/dev/shm/aeron # otherwise it defaults to /dev/shm/aeron-<user>
        - /opt/aeron-config/bootstrap.properties
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: aeron-md-config-dir
          mountPath: /opt/aeron-config
      resources:
        limits:
          cpu: "8"
          memory: 8G
