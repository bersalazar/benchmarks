---
apiVersion: v1
kind: Pod
metadata:
  name: aeron-cluster-client
spec:
  initContainers:
    - name: aeron-bootstrap
      image: "< Ref to aeron-bootstrap container >"
  containers:
    - name: aeronmd-java
      image: "< Ref to benchmark container >"
    - name: aeron-cluster-client
      image: "< Ref to benchmark container >"
      command: ["k8s/k8s-aeron-cluster-client.sh"]
      args:
        - "--output-file"
        - "cluster_java_source=caf"
        - "--message-rate"
        - "101K"
        - "--message-length"
        - "288"
        - "--iterations"
        - "60"
