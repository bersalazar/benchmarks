---
apiVersion: v1
kind: Pod
metadata:
  name: aeron-cluster-client
  annotations:
    # These are required so dpdk-endpoint-slice-handler creates the corresponding EndpointSlices for each pod.
    dpdk/service-name: aeron-benchmark
    dpdk/port: "1000"
    dpdk/protocol: UDP
spec:
  containers:
    - name: aeronmd-dpdk
      image: "< Ref to Aeron DPDK media driver container >"
    - name: aeron-cluster-client
      image: "< Ref to benchmark container >"
      command: ["k8s/k8s-aeron-cluster-client.sh"]
      args:
        - "--output-file"
        - "cluster_dpdk_source=caf"
        - "--message-rate"
        - "101K"
        - "--message-length"
        - "288"
        - "--iterations"
        - "60"
