---
apiVersion: v1
kind: Service
metadata:
  name: aeron-cluster-client
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true # This is set so DNS resolves at all times, despite the Readiness check
---
apiVersion: v1
kind: Pod
metadata:
  name: aeron-cluster-client
  labels:
    app.kubernetes.io/component: aeron-client
spec:
  serviceAccountName: aeron-benchmark-sa
  restartPolicy: Always
  terminationGracePeriodSeconds: 5
  volumes:
    - name: hugepage-2mi
      emptyDir:
        medium: HugePages-2Mi
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 2Gi
    - name: aeron-properties
      configMap:
        name: aeron-properties
        items:
          - key: benchmark.properties
            path: benchmark.properties
          - key: low-latency-driver.properties
            path: low-latency-driver.properties
          - key: node.properties
            path: node.properties
    # This volume holds the configuration generated by the aeron-bootstrap initcontainer
    - name: aeronmd-config
      emptyDir: {}
  tolerations:
    # Select our special benchmark nodes
    - key: "perftest"
      operator: "Exists"
  # Select our special benchmark nodes
  nodeSelector:
    weareadaptive.com/nodegroup: "perftest"

  containers:
    - name: aeron-cluster-client
      imagePullPolicy: Always # Always pull the latest image and ensure the latest benchmark code is used
      volumeMounts:
        - mountPath: /hugepages-2Mi
          name: hugepage-2mi
        - mountPath: /dev/shm
          name: shm
        - name: aeron-properties
          mountPath: /opt/aeron-benchmarks/scripts/aeron/benchmark.properties
          subPath: benchmark.properties
        - name: aeron-properties
          mountPath: /opt/aeron-benchmarks/scripts/aeron/low-latency-driver.properties
          subPath: low-latency-driver.properties
      resources:
        requests:
          cpu: "8"
          memory: 8G
          hugepages-2Mi: 1Gi
        limits:
          cpu: "8"
          memory: 8G
          hugepages-2Mi: 1Gi
      envFrom:
        - configMapRef:
            name: aeron-benchmark-envs
      env:
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: POD_INDEX
        valueFrom:
          fieldRef:
            fieldPath: metadata.labels['apps.kubernetes.io/pod-index']

    - name: results
      image: public.ecr.aws/docker/library/busybox:stable
      command:
        - "sleep"
        - "infinity"
      envFrom:
        - configMapRef:
            name: aeron-benchmark-envs
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
      resources:
        # Must set limits, as whole Pod must have requests = limits to get into Guarenteed QoS class
        limits:
          cpu: "1"
          memory: 512Mi
---
# Permission to look up Pod details
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aeron-benchmark
rules:
  # Allow reading pods to find bootstrap neighbors
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
---
# Serviceaccount for aeron-k8s-bootstrap to run under
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aeron-benchmark-sa
---
# Bind the previously created role to the aeron-k8s-bootstrap service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aeron-benchmark
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aeron-benchmark
subjects:
  - kind: ServiceAccount
    name: aeron-benchmark-sa
