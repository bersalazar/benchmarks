---
# Update tolerations and nodeselectors
apiVersion: v1
kind: Pod
metadata:
  name: all
spec:
  tolerations:
    # Select our special benchmark nodes
    - key: "perftest"
      operator: "Exists"
  # Select our special benchmark nodes
  nodeSelector:
    weareadaptive.com/nodegroup: "perftest"

  containers:
    - name: benchmark
      image: "195275652846.dkr.ecr.eu-west-1.amazonaws.com/aeron-benchmarks:2ca925be148273593c4152b9585e5d1d5e59a765"
