---
# Update tolerations and nodeselectors
apiVersion: v1
kind: Pod
metadata:
  name: all
spec:
  tolerations:
    # Select our special benchmark nodes
    - key: "perftest"
      operator: "Exists"
  # Select our special benchmark nodes
  nodeSelector:
    weareadaptive.com/nodegroup: "perftest"

  containers:
    - name: benchmark
      image: "< Ref to benchmark container >"
